version: '3.9'

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: stockflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: stockflow
      POSTGRES_PASSWORD: stockflow123
      POSTGRES_DB: stockflow_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockflow -d stockflow_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stockflow_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://stockflow:stockflow123@postgres:5432/stockflow_db
      SECRET_KEY: ${SECRET_KEY:-supersecretkey-change-in-production}
      CORS_ORIGINS: "http://localhost:3001,http://localhost:3000,http://localhost:5173,http://frontend:80"
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: /start.sh
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8001
    container_name: stockflow_frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
